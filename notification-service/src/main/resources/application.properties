# ==========================================================================
# PulsoCare notification-service
# ==========================================================================
spring.application.name=notification-service
# No es una app web (es un worker que consume SQS)
spring.main.web-application-type=none

# --- Oracle Autonomous (wallet) -------------------------------------------
# WALLET_DIR debe apuntar a la carpeta del wallet descomprimido (TNS_ADMIN).
# Con cwallet.sso (auto-login) NO se necesita password de wallet en JDBC.
spring.datasource.url=jdbc:oracle:thin:@${DB_DSN:bdpulsocaretads_low}?TNS_ADMIN=${WALLET_DIR}
spring.datasource.username=${DB_USER:ADMIN}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- AWS ------------------------------------------------------------------
aws.region=${AWS_REGION:us-east-1}
aws.sqs.queue-url=${SQS_QUEUE_URL}
aws.sns.topic-arn=${SNS_TOPIC_ARN}

# Sondeo de SQS
pulsocare.sqs.wait-seconds=20
pulsocare.sqs.max-messages=10

logging.level.cl.pulsocare=INFO
