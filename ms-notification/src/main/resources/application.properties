# ==========================================================================
# PulsoCare ms-notification
# ==========================================================================
spring.application.name=ms-notification
# No es una app web (es un worker que consume SQS)
spring.main.web-application-type=none

# --- Oracle Autonomous (wallet) -------------------------------------------
# WALLET_DIR debe apuntar a la carpeta del wallet descomprimido (TNS_ADMIN).
# Con cwallet.sso (auto-login) NO se necesita password de wallet en JDBC.
spring.datasource.url=jdbc:oracle:thin:@${DB_DSN:bdpulsocaretads_low}?TNS_ADMIN=${WALLET_DIR}
spring.datasource.username=${DB_USER:ADMIN}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- Pool de conexiones HikariCP -----------------------------------------
# La Autonomous DB comparte su limite de sesiones entre TODOS los microservicios
# (+ la Lambda). Se acota el pool de cada servicio para no agotarlo: 5 servicios
# x 3 = 15 conexiones maximo. max-lifetime < timeout de sesion de la BD.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=280000
spring.datasource.hikari.connection-timeout=20000

# --- AWS ------------------------------------------------------------------
aws.region=${AWS_REGION:us-east-1}
aws.sqs.queue-url=${SQS_QUEUE_URL}
aws.sns.topic-arn=${SNS_TOPIC_ARN}

# Sondeo de SQS
pulsocare.sqs.wait-seconds=20
pulsocare.sqs.max-messages=10

logging.level.cl.pulsocare=INFO
