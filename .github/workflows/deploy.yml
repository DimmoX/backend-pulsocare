name: CI/CD - backend a EC2 (SSM)

# Se dispara al integrar en main (o manualmente desde la pestana Actions).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------------
  # 1) Construye y publica las 6 imagenes (una por microservicio) en Docker Hub.
  #    Sin secretos en las imagenes: la config va en el .env de la instancia.
  # ----------------------------------------------------------------------
  build-push:
    runs-on: ubuntu-latest
    # Los secrets viven en el environment env_ms_pulsocare; el job debe declararlo.
    environment: env_ms_pulsocare
    strategy:
      matrix:
        service: [ ms-auth, ms-pacientes, ms-config, ms-consultas, ms-notification, ms-gateway ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pulsocare-${{ matrix.service }}:latest

  # ----------------------------------------------------------------------
  # 2) Despliega en la EC2 por AWS SSM (sin SSH, sin llave privada).
  #    Requisito previo (una vez, por SSH restringido a tu IP): la instancia
  #    con Docker, ~/backend/docker-compose.hub.yml, ~/backend/.env y el wallet.
  # ----------------------------------------------------------------------
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Los secrets AWS/EC2 tambien viven en env_ms_pulsocare.
    environment: env_ms_pulsocare
    steps:
      - name: Configurar credenciales de AWS (temporales del lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Desplegar por SSM (pull + up)
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "CD backend PulsoCare" \
            --parameters commands='["set -e","cd /home/admin/backend","docker compose -f docker-compose.hub.yml pull","docker compose -f docker-compose.hub.yml up -d","docker image prune -f"]' \
            --query "Command.CommandId" --output text)
          echo "CommandId: $CMD_ID"

          # Espera a que el comando termine en la instancia.
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

          echo "----- salida en la instancia -----"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)
          echo "Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "----- error en la instancia -----"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
