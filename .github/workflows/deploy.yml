name: CI/CD - backend a EC2 (SSM)

# Se dispara al integrar en main (o manualmente desde la pestana Actions).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------------
  # 1) Detecta QUE microservicios cambiaron en el push.
  #    - push: solo los servicios con cambios en su carpeta.
  #    - workflow_dispatch (manual): los 6 (despliegue completo).
  # ----------------------------------------------------------------------
  detectar:
    runs-on: ubuntu-latest
    outputs:
      servicios: ${{ steps.salida.outputs.servicios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar carpetas cambiadas
        uses: dorny/paths-filter@v3
        id: cambios
        with:
          filters: |
            ms-auth: 'ms-auth/**'
            ms-pacientes: 'ms-pacientes/**'
            ms-config: 'ms-config/**'
            ms-consultas: 'ms-consultas/**'
            ms-notification: 'ms-notification/**'
            ms-gateway: 'ms-gateway/**'

      - name: Armar la lista de servicios a construir
        id: salida
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'servicios=["ms-auth","ms-pacientes","ms-config","ms-consultas","ms-notification","ms-gateway"]' >> "$GITHUB_OUTPUT"
          else
            echo 'servicios=${{ steps.cambios.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------------
  # 2) Construye y publica SOLO las imagenes de los servicios que cambiaron.
  # ----------------------------------------------------------------------
  build-push:
    needs: detectar
    if: needs.detectar.outputs.servicios != '[]'
    runs-on: ubuntu-latest
    environment: env_ms_pulsocare
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detectar.outputs.servicios) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pulsocare-${{ matrix.service }}:latest

  # ----------------------------------------------------------------------
  # 3) Despliega en la EC2 por SSM. `docker compose up -d` recrea SOLO los
  #    contenedores cuya imagen cambio (los que no se re-empujaron quedan
  #    corriendo intactos) -> despliegue independiente por servicio.
  # ----------------------------------------------------------------------
  deploy:
    needs: [detectar, build-push]
    if: needs.detectar.outputs.servicios != '[]'
    runs-on: ubuntu-latest
    environment: env_ms_pulsocare
    steps:
      - name: Configurar credenciales de AWS (temporales del lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Desplegar por SSM (pull + up)
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "CD backend PulsoCare" \
            --parameters commands='["set -e","cd /home/admin/backend","docker compose -f docker-compose.hub.yml pull","docker compose -f docker-compose.hub.yml up -d","docker image prune -f"]' \
            --query "Command.CommandId" --output text)
          echo "CommandId: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

          echo "----- salida en la instancia -----"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)
          echo "Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "----- error en la instancia -----"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
