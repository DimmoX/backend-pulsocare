# ==========================================================================
# PulsoCare ms-gateway
# --------------------------------------------------------------------------
# Las URIs de destino se parametrizan por variable de entorno: en local usan
# localhost (valores por defecto); en docker-compose se sobreescriben con el
# nombre del servicio (p. ej. http://ms-auth:8082).
# ==========================================================================
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Valores del tenant B2C, verificados contra su metadata OIDC.
          # El issuer lleva el id del tenant, NO el nombre: b2clogin devuelve
          # .../cd872f70-.../v2.0/ y si no coincide exacto, TODO token se rechaza.
          issuer-uri: ${B2C_ISSUER_URI:https://pulsocareduoc.b2clogin.com/cd872f70-8721-47a9-9b37-08b113c989ec/v2.0/}
          jwk-set-uri: ${B2C_JWK_SET_URI:https://pulsocareduoc.b2clogin.com/pulsocareduoc.onmicrosoft.com/b2c_1_sign_in/discovery/v2.0/keys}
          # El frontend pide su propio clientId como scope, asi que el token viene
          # dirigido a el.
          audiences: ${B2C_AUDIENCE:bbc1023b-e89e-4fd1-925c-141f8d7d148c}

  application:
    name: ms-gateway
  cloud:
    gateway:
      # El orden importa: las rutas mas especificas van antes que la generica
      # de pacientes (de lo contrario /api/pacientes/{id}/lecturas nunca llega
      # a ms-consultas).
      routes:
        - id: auth
          uri: ${MS_AUTH_URI:http://localhost:8082}
          predicates:
            - Path=/api/auth/**

        - id: umbrales
          uri: ${MS_CONFIG_URI:http://localhost:8083}
          predicates:
            - Path=/api/umbrales/**

        - id: alertas
          uri: ${MS_CONSULTAS_URI:http://localhost:8084}
          predicates:
            - Path=/api/alertas/**

        - id: bitacora
          uri: ${MS_CONSULTAS_URI:http://localhost:8084}
          predicates:
            - Path=/api/bitacora/**

        - id: lecturas
          uri: ${MS_CONSULTAS_URI:http://localhost:8084}
          predicates:
            - Path=/api/pacientes/*/lecturas/**

        # Debe ir antes de la ruta generica de pacientes: el puntaje NEWS2 se calcula
        # en ms-consultas (desde las ultimas lecturas), no en ms-pacientes.
        - id: news2
          uri: ${MS_CONSULTAS_URI:http://localhost:8084}
          predicates:
            - Path=/api/pacientes/*/news2

        - id: usuarios
          uri: ${MS_PACIENTES_URI:http://localhost:8081}
          predicates:
            - Path=/api/usuarios/**

        - id: pacientes
          uri: ${MS_PACIENTES_URI:http://localhost:8081}
          predicates:
            - Path=/api/pacientes/**

      # CORS para que el frontend Angular (dev server) pueda llamar al gateway.
      globalcors:
        # Sin esto el preflight OPTIONS no entra al mapeo de rutas del gateway y se
        # responde 403, con lo que el navegador bloquea TODAS las llamadas del
        # frontend (que van con cabecera Authorization y por eso siempre lo disparan).
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_ORIGIN:http://localhost:4200}
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: [authorization, content-type]
            # Sin esto el navegador oculta X-Total-Count a JavaScript (solo expone las
            # cabeceras simples), y el frontend no sabria cuantas paginas hay.
            exposedHeaders: [X-Total-Count]
            allowCredentials: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    cl.pulsocare: INFO

# Clave que presentan los procesos internos sin usuario (el replayer) para consultar
# la lista de pacientes. Sin valor definido, esa puerta queda cerrada.
pulsocare:
  clave-servicio: ${SERVICE_API_KEY:}
