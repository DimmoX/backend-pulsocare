# ==========================================================================
# PulsoCare ms-consultas
# ==========================================================================
spring.application.name=ms-consultas
server.port=${SERVER_PORT:8084}

# --- Oracle Autonomous (wallet) -------------------------------------------
# WALLET_DIR apunta a la carpeta del wallet descomprimido (TNS_ADMIN).
# Con cwallet.sso (auto-login) el JDBC NO necesita password de wallet.
spring.datasource.url=jdbc:oracle:thin:@${DB_DSN:bdpulsocaretads_low}?TNS_ADMIN=${WALLET_DIR}
spring.datasource.username=${DB_USER:ADMIN}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Tope de filas por consulta de historico (evita respuestas gigantes).
pulsocare.consultas.limite-maximo=1000

logging.level.cl.pulsocare=INFO
