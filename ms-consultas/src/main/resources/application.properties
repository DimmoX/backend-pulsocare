# ==========================================================================
# PulsoCare ms-consultas
# ==========================================================================
spring.application.name=ms-consultas
server.port=${SERVER_PORT:8084}

# --- Oracle Autonomous (wallet) -------------------------------------------
# WALLET_DIR apunta a la carpeta del wallet descomprimido (TNS_ADMIN).
# Con cwallet.sso (auto-login) el JDBC NO necesita password de wallet.
spring.datasource.url=jdbc:oracle:thin:@${DB_DSN:bdpulsocaretads_low}?TNS_ADMIN=${WALLET_DIR}
spring.datasource.username=${DB_USER:ADMIN}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Tope de filas por consulta de historico (evita respuestas gigantes).
pulsocare.consultas.limite-maximo=1000

# --- Cache (ElastiCache / Redis) ------------------------------------------
# Cachea la "ventana reciente" (ultimas lecturas por signo) para el dashboard.
# Si esta deshabilitado o Redis no responde, se cae a Oracle sin romperse.
# La conexion la arma RedisConfig segun el entorno:
#   Local: REDIS_CLUSTER=false REDIS_SSL=false  (standalone plano)
#   AWS:   REDIS_CLUSTER=true  REDIS_SSL=true    (ElastiCache cluster + TLS)
pulsocare.cache.enabled=${CACHE_ENABLED:false}
pulsocare.cache.ttl-segundos=${CACHE_TTL:30}
pulsocare.redis.host=${REDIS_HOST:localhost}
pulsocare.redis.port=${REDIS_PORT:6379}
pulsocare.redis.cluster=${REDIS_CLUSTER:false}
pulsocare.redis.ssl=${REDIS_SSL:false}

logging.level.cl.pulsocare=INFO
