# ==========================================================================
# PulsoCare ms-auth
# ==========================================================================
spring.application.name=ms-auth
server.port=${SERVER_PORT:8082}

# --- Oracle Autonomous (wallet) -------------------------------------------
spring.datasource.url=jdbc:oracle:thin:@${DB_DSN:bdpulsocaretads_low}?TNS_ADMIN=${WALLET_DIR}
spring.datasource.username=${DB_USER:ADMIN}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- Pool de conexiones HikariCP -----------------------------------------
# La Autonomous DB comparte su limite de sesiones entre TODOS los microservicios
# (+ la Lambda). Se acota el pool de cada servicio para no agotarlo: 5 servicios
# x 3 = 15 conexiones maximo. max-lifetime < timeout de sesion de la BD.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=280000
spring.datasource.hikari.connection-timeout=20000

# Rol por defecto al auto-registrar un usuario que llega desde Azure Entra ID
# (PC_ROL: 1=Medico, 2=Enfermero, 3=Familiar, 4=Administrador)
pulsocare.auth.rol-por-defecto=3

# --- Azure AD B2C (crear usuarios via Microsoft Graph) --------------------
# Si esta deshabilitado, el admin crea el usuario solo en Oracle (util en local).
# En AWS se activa con las credenciales de la app de backend de B2C.
pulsocare.b2c.enabled=${B2C_ENABLED:false}
pulsocare.b2c.tenant-id=${GRAPH_TENANT_ID:}
pulsocare.b2c.client-id=${GRAPH_CLIENT_ID:}
pulsocare.b2c.client-secret=${GRAPH_CLIENT_SECRET:}
pulsocare.b2c.issuer-domain=${GRAPH_ISSUER_DOMAIN:pulsocareduoc.onmicrosoft.com}

# --- SNS (suscribir el correo del usuario a las alertas al crearlo) ------
# Si esta deshabilitado, no se suscribe a nadie (util en local).
pulsocare.sns.enabled=${SNS_SUBSCRIBE_ENABLED:false}
pulsocare.sns.topic-arn=${SNS_TOPIC_ARN:}
aws.region=${AWS_REGION:us-east-1}

logging.level.cl.pulsocare=INFO
