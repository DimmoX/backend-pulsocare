# ==========================================================================
# PulsoCare ms-auth
# ==========================================================================
spring.application.name=ms-auth
server.port=${SERVER_PORT:8082}

# --- Oracle Autonomous (wallet) -------------------------------------------
spring.datasource.url=jdbc:oracle:thin:@${DB_DSN:bdpulsocaretads_low}?TNS_ADMIN=${WALLET_DIR}
spring.datasource.username=${DB_USER:ADMIN}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Rol por defecto al auto-registrar un usuario que llega desde Azure Entra ID
# (PC_ROL: 1=Medico, 2=Enfermero, 3=Familiar, 4=Administrador)
pulsocare.auth.rol-por-defecto=3

logging.level.cl.pulsocare=INFO
